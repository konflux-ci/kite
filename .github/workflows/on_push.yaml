name: Run Tests
on:
  push:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: '1.23'

      - name: Test Backend
        run: |
          cd packages/backend
          go test -v ./internal/...

on:
  pull_request:
    branches: ["**"]

jobs:
  pr-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.29'

      - name: Verify dependencies are tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Lint
        run: |
          go vet ./...

      - name: Format check
        run: |
          test -z "$(gofmt -l .)"

      - name: Build
        run: go build ./...

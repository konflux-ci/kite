on:
  pull_request:
    branches: ["**"]

jobs:
  pr-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Verify backend dependencies are tidy
        run: |
          cd packages/backend
          go mod tidy
          git diff --exit-code

      - name: Lint
        run: |
          cd packages/backend
          go vet ./...

      - name: Format check
        run: |
          cd packages/backend
          # Check if any files need formatting
          FILES=$(gofmt l .)
          # Print any files needing formatting
          if [ -n "$FILES" ]; then
            echo "The following files need formatting:"
            echo "$FILES"
          exit 1
          fi

      - name: Build
        run: |
          cd packages/backend
          go build ./...

      - name: Install binary
        run: |
          cd packages/backend
          go install ./...

      - name: Test Backend
        run: |
          cd packages/backend
          go test -v ./internal/...


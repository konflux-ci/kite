name: CI

on:
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Run Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - name: Checkout branch
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Verify backend dependencies are tidy
        run: |
          go mod tidy
          result=git diff --exit-code
          if [ -n "$result" ]; then
            echo "Please run go mod tidy and commit changes"
            echo "$result"
            exit 1
          fi

      - name: Lint
        run: |
          go vet ./...

      - name: Format check
        run: |
          # Check if any files need formatting
          FILES=$(gofmt -l .)
          # Print any files needing formatting
          if [ -n "$FILES" ]; then
            echo "The following files need formatting:"
            echo "$FILES"
          exit 1
          fi

      - name: Build
        run: |
          go build ./...

      - name: Install binary
        run: |
          go install ./...

      - name: Test Backend
        run: |
          go test -v ./internal/...

